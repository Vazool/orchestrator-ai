openapi: 3.0.3
info:
  title: EA Proactive Assistance Orchestrator API
  version: 0.1.0
  description: |
    Minimal API contract for the PoC demo.
    Supports Operator Console (simulate + dashboard) and Customer View (alerts polling).

servers:
  - url: http://localhost:5000

paths:
  /simulate-event:
    post:
      summary: Simulate an external event and run orchestration
      operationId: simulateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateEventRequest"
            example:
              event_type: weather_warning
              source: simulator
              event_date: "2026-02-12"
              location_type: airport
              location_code: CDG
              severity_level: 4
              external_ref: MF-12345
              event_description: Red/orange wind and heavy rain warning
              payload:
                headline: Severe weather expected
                effective_start: "2026-02-12T06:00:00Z"
                effective_end: "2026-02-12T18:00:00Z"
      responses:
        "200":
          description: Event created and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateEventResponse"
              example:
                event_id: 101
                created_at: "2026-02-10T12:01:02Z"
                customers_evaluated: 12
                notifications_created: 7
                decision_breakdown:
                  eligible: 6
                  goodwill_alert: 1
                  not_travelling: 2
                  no_consent: 3
                  no_coverage: 0
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard:
    get:
      summary: Get dashboard metrics and breakdowns for an event
      operationId: getDashboard
      parameters:
        - name: event_id
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: Event identifier returned by POST /simulate-event
      responses:
        "200":
          description: Dashboard summary for the event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
              example:
                event:
                  event_id: 101
                  event_type: weather_warning
                  event_date: "2026-02-12"
                  location_type: airport
                  location_code: CDG
                  severity_level: 4
                metrics:
                  customers_evaluated: 12
                  notifications_created: 7
                decision_breakdown:
                  - reason_code: eligible
                    count: 6
                  - reason_code: goodwill_alert
                    count: 1
                  - reason_code: not_travelling
                    count: 2
                  - reason_code: no_consent
                    count: 3
                  - reason_code: no_coverage
                    count: 0
                channel_breakdown:
                  - channel_type: app
                    count: 5
                  - channel_type: email
                    count: 2
                  - channel_type: other
                    count: 0
        "400":
          description: Missing or invalid event_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alerts:
    get:
      summary: Get latest customer alerts (compatibility endpoint)
      operationId: getAlerts
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Max number of alerts to return
      responses:
        "200":
          description: List of alerts for the customer view to render
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
              example:
                - id: 9001
                  message: "Hi Alice. Severe weather is forecast at Paris CDG on 12 Feb. Allow extra time and check flight status."
                  time: "2026-02-10T12:01:10Z"
                  isRead: false
                - id: 9002
                  message: "Hi Freda. Severe weather is forecast at Paris CDG on 12 Feb. Your policy does not include cover for weather disruption."
                  time: "2026-02-10T12:01:11Z"
                  isRead: false

components:
  schemas:
    EventType:
      type: string
      enum:
        - weather_warning
        - flight_disruption
        - gov_advice_change
        - major_event

    SourceType:
      type: string
      enum:
        - simulator
        - live_api
        - manual

    LocationType:
      type: string
      enum:
        - country
        - admin_area
        - city
        - airport
        - flight

    ReasonCode:
      type: string
      enum:
        - eligible
        - goodwill_alert
        - not_travelling
        - no_consent
        - no_coverage

    ChannelType:
      type: string
      enum:
        - app
        - email
        - other
        - sms
        - push
        - whatsapp
        - in_app

    SimulateEventRequest:
      type: object
      additionalProperties: false
      required:
        - event_type
        - source
        - event_date
        - location_type
        - location_code
        - severity_level
        - payload
      properties:
        event_type:
          $ref: "#/components/schemas/EventType"
        source:
          $ref: "#/components/schemas/SourceType"
        event_date:
          type: string
          format: date
          description: Date used for trip matching in the PoC
        location_type:
          $ref: "#/components/schemas/LocationType"
        location_code:
          type: string
          description: Code matching your locations dataset (eg CDG, FR-75, FR)
          minLength: 1
          maxLength: 20
        severity_level:
          type: integer
          minimum: 1
          maximum: 5
        external_ref:
          type: string
          nullable: true
          maxLength: 50
        event_description:
          type: string
          nullable: true
          maxLength: 2000
        payload:
          type: object
          description: Event-type specific fields retained for audit and message generation
          additionalProperties: true

    SimulateEventResponse:
      type: object
      additionalProperties: false
      required:
        - event_id
        - created_at
        - customers_evaluated
        - notifications_created
        - decision_breakdown
      properties:
        event_id:
          type: integer
        created_at:
          type: string
          format: date-time
        customers_evaluated:
          type: integer
          minimum: 0
        notifications_created:
          type: integer
          minimum: 0
        decision_breakdown:
          type: object
          description: Count per reason_code (keys are reason codes)
          additionalProperties: false
          required:
            - eligible
            - goodwill_alert
            - not_travelling
            - no_consent
            - no_coverage
          properties:
            eligible:
              type: integer
              minimum: 0
            goodwill_alert:
              type: integer
              minimum: 0
            not_travelling:
              type: integer
              minimum: 0
            no_consent:
              type: integer
              minimum: 0
            no_coverage:
              type: integer
              minimum: 0

    DashboardEvent:
      type: object
      additionalProperties: false
      required:
        - event_id
        - event_type
        - event_date
        - location_type
        - location_code
        - severity_level
      properties:
        event_id:
          type: integer
        event_type:
          $ref: "#/components/schemas/EventType"
        event_date:
          type: string
          format: date
        location_type:
          $ref: "#/components/schemas/LocationType"
        location_code:
          type: string
        severity_level:
          type: integer
          minimum: 1
          maximum: 5

    DashboardMetrics:
      type: object
      additionalProperties: false
      required:
        - customers_evaluated
        - notifications_created
      properties:
        customers_evaluated:
          type: integer
          minimum: 0
        notifications_created:
          type: integer
          minimum: 0

    DecisionBreakdownItem:
      type: object
      additionalProperties: false
      required:
        - reason_code
        - count
      properties:
        reason_code:
          $ref: "#/components/schemas/ReasonCode"
        count:
          type: integer
          minimum: 0

    ChannelBreakdownItem:
      type: object
      additionalProperties: false
      required:
        - channel_type
        - count
      properties:
        channel_type:
          $ref: "#/components/schemas/ChannelType"
        count:
          type: integer
          minimum: 0

    DashboardResponse:
      type: object
      additionalProperties: false
      required:
        - event
        - metrics
        - decision_breakdown
      properties:
        event:
          $ref: "#/components/schemas/DashboardEvent"
        metrics:
          $ref: "#/components/schemas/DashboardMetrics"
        decision_breakdown:
          type: array
          items:
            $ref: "#/components/schemas/DecisionBreakdownItem"
        channel_breakdown:
          type: array
          description: Optional for v0, but included for the demo chart
          items:
            $ref: "#/components/schemas/ChannelBreakdownItem"

    Alert:
      type: object
      additionalProperties: false
      required:
        - id
        - message
        - time
        - isRead
      properties:
        id:
          type: integer
        message:
          type: string
        time:
          type: string
          format: date-time
        isRead:
          type: boolean

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
        details:
          type: object
          nullable: true
          additionalProperties: true
